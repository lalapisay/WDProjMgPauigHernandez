    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hammersmith+One&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

<style>
    .box{
        background-color: white;
        flex-direction: column;
        width: auto;
        height: auto;
        border: 3px solid black;
        padding: 15px 15px 15px 15px;
        margin-top: 20px;}
    .subbot{
        border-radius: 12px;
        padding: 10px 20px;
        background-color: orange;
        border: none;
    }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
        .box {
            width: 90% !important;
            margin: 20px auto;
            padding: 12px;
        }

        form label {
            font-size: 16px;
            display: block;
            margin-bottom: 4px;
        }

        form input[type="text"],
        form input[type="password"] {
            width: 100%;
            font-size: 16px;
            padding: 8px 4px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        .subbot {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            cursor: pointer;
        }
    }

    @media (max-width: 480px) {
        .box {
            width: 85% !important;
            margin: 15px auto;
            padding: 10px;
            border: 2px solid black;
        }

        form {
            width: 100%;
        }

        form label {
            font-size: 0.95rem;
            margin-bottom: 3px;
        }

        form input[type="text"],
        form input[type="password"] {
            width: 100%;
            font-size: 16px;
            padding: 8px 4px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .subbot {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }
    }

</style>

        <input type="text" id="username" name="username"><br>
